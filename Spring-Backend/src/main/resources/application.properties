spring.application.name=ecommerce

# Đổi port ứng dụng sang 8080
server.port=8080

# Support reading from .env file
spring.config.import=optional:file:.env[.properties],optional:file:Spring-Backend/.env[.properties]

# Database url address
spring.datasource.url = ${DATASOURCE_URL}

# Frontend URL
frontend.url=${FRONTEND_URL}

# Config user
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}

# Driver của MySQL
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Cấu hình JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Hibernate Performance Tuning
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# HikariCP Connection Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# Hiển thị câu lệnh SQL ra console để bạn dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true